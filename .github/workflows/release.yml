name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4.2.2
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4.2.0
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Publish
      run: dotnet publish ApexAstro.Wpf -c Release -r win-x64 --no-self-contained --output ./publish
      
    - name: Create ZIP package
      run: |
        cd publish
        # Remove debug files
        Remove-Item *.pdb
        # Create release package
        Compress-Archive -Path * -DestinationPath ../ApexAstro-win-x64.zip
        cd ..
    
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
        
    - name: Build Installer
      run: |
        # Refresh PATH to include Inno Setup
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        # Compile the installer script
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        # Copy installer with version in filename (includes 'v' prefix)
        $VERSION = "${{ github.ref_name }}"
        Copy-Item installer-output\ApexAstro-Setup-*.exe .\ApexAstro-Setup-$VERSION.exe
    
    - name: Verify files
      run: |
        $VERSION = "${{ github.ref_name }}"
        Write-Host "Files to upload:"
        Get-Item ApexAstro-win-x64.zip | Format-List Name, Length
        Get-Item ApexAstro-Setup-$VERSION.exe | Format-List Name, Length
        
    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $TAG = "${{ github.ref_name }}"
        $VERSION = $TAG
        
        # Read release notes from RELEASE_NOTES.txt
        $CUSTOM_NOTES = Get-Content -Path "RELEASE_NOTES.txt" -Raw
        
        $RELEASE_NOTES = @"
        ## ApexAstro $TAG
        
        ### System Requirements
        - Windows 10/11 (64-bit)
        - [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0)
        
        ### Installation Options
        
        #### Option 1: Installer (Recommended)
        1. Download ``ApexAstro-Setup-$VERSION.exe``
        2. Run the installer
        3. The installer will:
           - Check for .NET 8 Desktop Runtime (prompts to download if missing)
           - Install to ``%LOCALAPPDATA%\ApexAstro``
           - Create Start Menu shortcuts
           - Use streamlined setup (only 2-3 clicks required)
        
        #### Option 2: Portable ZIP
        1. Download ``ApexAstro-win-x64.zip``
        2. Extract all files to a folder of your choice
        3. Run ``ApexAstro.exe``
        4. Ensure .NET 8 Desktop Runtime is installed
        
        ### What's New
        
        $CUSTOM_NOTES
        "@
        
        # Create release with gh CLI
        gh release create $TAG `
          ApexAstro-win-x64.zip `
          ApexAstro-Setup-$VERSION.exe `
          --title "ApexAstro $TAG" `
          --notes "$RELEASE_NOTES"